<!DOCTYPE html>
<html lang="{{ site.lang | default: 'nl' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | escape }}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
</head>
<body>

  {% include header.html %}

  <div class="flow">
    {{ content }}
    {%- if page.url contains '/familiereis/' and page.url != '/familiereis/' -%}
      <div class="wrap">{% include familiereis_prev_next.html %}</div>
    {%- endif -%}
  </div>

  {% include footer.html %}

</body>
</html>
