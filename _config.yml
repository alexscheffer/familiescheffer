# familiescheffer.nl — Jekyll-configuratie
# Minimaal: titel, taal, baseurl. Geen plugins buiten wat GitHub Pages
# standaard ondersteunt.

title: "Arjan & Alex Scheffer-Koster"
description: "De familiewebsite van Arjan en Alex Scheffer-Koster uit de Achterhoek."
lang: nl

# baseurl: pad waarop de site draait, *onder* het hostnaam-niveau.
# Tijdens testen op GitHub Pages serveert github de repo op
#   https://<gebruiker>.github.io/familiescheffer/
# dus alle interne paden moeten met /familiescheffer/ beginnen, anders gaan
# CSS en navigatielinks 404. Daarom: baseurl: "/familiescheffer".
#
# Zodra het eigen domein familiescheffer.nl gekoppeld is (CNAME + DNS), draait
# de site op de root van dat domein. Zet baseurl dan terug op "":
#   baseurl: ""
# Dat is de enige regel die hoeft te veranderen — alle links gebruiken al
# relative_url / link-filter, die nemen baseurl automatisch mee.
baseurl: "/familiescheffer"
url: ""

# Niet meenemen in de gebouwde site.
exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - vendor
