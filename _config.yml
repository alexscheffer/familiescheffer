# familiescheffer.nl — Jekyll-configuratie
# Minimaal: titel, taal, baseurl. Geen plugins buiten wat GitHub Pages
# standaard ondersteunt.

title: "Arjan & Alex Scheffer-Koster"
description: "De familiewebsite van Arjan en Alex Scheffer-Koster uit de Achterhoek."
lang: nl

# baseurl: pad waarop de site draait, *onder* het hostnaam-niveau.
# Eigen domein familiescheffer.nl is gekoppeld via CNAME, dus de site draait
# op de root van dat domein. Daarom: baseurl: "".
#
# Wil je tijdelijk testen op de github.io-test-URL <gebruiker>.github.io/<repo>/?
# Dan moet baseurl terug naar "/<repo>", anders gaan CSS- en navigatielinks 404.
# Alle interne links gebruiken het relative_url / link-filter, die nemen
# baseurl automatisch mee — dus deze ene regel is genoeg.
baseurl: ""
url: "https://familiescheffer.nl"

# Niet meenemen in de gebouwde site.
exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - vendor
